<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro</title>
</head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<body class="container">
    <h1>Cadastro de viajante</h1>
    <form action="#" method="get" enctype="multipart/form-data">
        <!-- DADOS PESSOAIS -->
        <fieldset class="form-control mb-3">
            <legend>Dados pessoais</legend>
            <label for="nome">Nome Completo</label>
            <input type="text" name="nome" class="container" id="nome" placeholder="Digite seu nome"
                title="Digite seu nome completo sem abreviações" class="form-control" maxlength="10" required>
            <label for="email">E-mail</label>
            <input type="email" class="container" name="email" id="email" placeholder="exemplo@email.com" required>
            <label for="idade">Idade</label>
            <input type="number" name="idade" id="idade" class="form-control" onchange="verificarIdade()" required>
        </fieldset>
        <fieldset class="form-control mb-3">
            <legend>Contato</legend>
            <label for="telefone">Número</label>
            <input type="tel" name="telefone" class="form-control" id="telefone" placeholder="(21)99999-9999" pattern="^(\d{2}\)\d{5}-\d{4}$" required>
        </fieldset>
        <fieldset class="form-control mb-1">
            <legend>Preferências de viagem</legend>
            <label for="destino">Destino</label>
            <input type="text" name="destino" id="destino" class="form-control" placeholder="Ex: Paris, NY, Istambul">
            <label for="tipo">Tipo</label>
            <Select name="tipo" id="tipo" class="form-control">
                <option value="praia">Praia</option>
                <option value="aventura">Aventura</option>
                <option value="romantica">Romântica</option>
                <option value="cultural">Cultural</option>
            </Select>
            <label for="dataIda">Data da Ída</label>
            <input type="date" name="dataIda" id="dataIda" class="form-control">
            <label for="dataVolta">Data da Volta</label>
            <input type="date" name="dataVolta" id="dataVolta" class="form-control">
            <p>Deseja receber promoções de viagens?</p>
            <input type="radio" name="promo" id="sim" value="sim"><label for="sim">Sim</label>
            <input type="radio" name="promo" id="nao" value="nao"><label for="nao">Não</label>
        </fieldset>
        <fieldset class="form-control mb-3">
            <legend>Outros</legend>
            <label for="passaporte">Upload de passaporte (opcional)</label>
            <input type="file" name="passaporte" id="passsaporte" class="form-control">
            <label for="cor">Cor favorita para tema da viagem</label>
            <input type="color" name="cor" id="cor">
            <p>Hobbies</p>
            <input type="checkbox" name="hobbies1" id="revista">
            <label for="revista">Revista</label>
            <input type="checkbox" name="hobbies2" id="jornal">
            <label for="Jornal">Jornal</label>
        </fieldset>

        <button type="submit" class="btn btn-info">Cadastrar</button>
        <button type="reset" class="btn btn-danger">Limpar</button>

    </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
        <script src="js/script.js"></script>
</body>
